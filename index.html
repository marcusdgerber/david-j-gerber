<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David J. Gerber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #1a1714;
      --ink-muted: #6b6560;
      --ink-faint: #b8b2ab;
      --paper: #f7f4ef;
      --paper-warm: #ede9e2;
      --accent: #2c2420;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(180, 160, 130, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 85% 80%, rgba(160, 140, 110, 0.09) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .frame {
      position: fixed;
      border: 1px solid var(--ink-faint);
      inset: 28px;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1.8s ease 0.4s forwards;
    }

    .frame::before,
    .frame::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--ink-muted);
      border-style: solid;
    }

    .frame::before {
      top: -1px;
      left: -1px;
      border-width: 1px 0 0 1px;
    }

    .frame::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 1px 1px 0;
    }

    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.6rem);
      letter-spacing: 0.18em;
      color: var(--ink);
      line-height: 1;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 1.4rem 0 1.2rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.9s forwards;
    }

    .ornament-line {
      width: 48px;
      height: 1px;
      background: var(--ink-faint);
    }

    .ornament-diamond {
      width: 4px;
      height: 4px;
      background: var(--ink-muted);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .role {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      letter-spacing: 0.12em;
      color: var(--ink-muted);
      opacity: 0;
      animation: fadeIn 1s ease 1.1s forwards;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <main class="stage">
    <h1 class="name">David J. Gerber</h1>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
    <p class="role">poet</p>
  </main>
</body>
</html>
